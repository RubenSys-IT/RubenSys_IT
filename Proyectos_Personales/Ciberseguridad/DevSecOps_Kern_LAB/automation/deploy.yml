---
- name: Provision Target Server and Install Docker Infrastructure
  hosts: production_servers
  become: true
  tasks:

    - name: Ensure system repositories are updated and upgraded
      apt:
        update_cache: yes
        upgrade: dist
        cache_valid_time: 3600

    - name: Install mandatory system dependencies
      apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Create directory for Docker APT keyring
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker official GPG signing key (.asc)
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Set up the stable Docker repository (DEB822 format)
      ansible.builtin.blockinfile:
        path: /etc/apt/sources.list.d/docker.sources
        create: yes
        mode: '0644'
        block: |
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: {{ ansible_facts['distribution_release'] }}
          Components: stable
          Architectures: amd64
          Signed-By: /etc/apt/keyrings/docker.asc

    - name: Install official Docker CE Engine and CLI packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        update_cache: yes
        state: present

    - name: Ensure Docker service is enabled and running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Deploy Cilium Tetragon eBPF Security Agent
      community.docker.docker_container:
        name: tetragon
        image: quay.io/cilium/tetragon:v1.2.0
        state: started
        restart_policy: always
        pid_mode: host
        privileged: true
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - /sys/fs/cgroup:/sys/fs/cgroup
          - /sys/kernel/btf/vmlinux:/sys/kernel/btf/vmlinux

    - name: Deploy Intentionally Vulnerable Target Workload
      community.docker.docker_container:
        name: vulnerable-app
        image: bkimminich/juice-shop:v16.0.0
        state: started
        restart_policy: always
        ports:
          - "3000:3000"
