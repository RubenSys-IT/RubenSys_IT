    - name: "Sede B - Aplicar Configuración en el Kernel"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}/api/wireguard/service/reconfigure"
        method: POST
        user: "{{ sedeB_api_key }}"
        password: "{{ sedeB_api_secret }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
        body_format: json
        body: {}

    - name: "Sede B - Crear Ruta Estática hacia LAN de HQ"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}/api/routes/routes/addRoute"
        method: POST
        user: "{{ sedeB_api_key }}"
        password: "{{ sedeB_api_secret }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
        body_format: json
        body:
          route:
            disabled: "0"
            network: "{{ hostvars['HQ_Firewall']['hq_lan_subnet'] }}"
            gateway: "{{ hostvars['HQ_Firewall']['hq_tunnel_ip'] }}"
            descr: "Ruta LAN HQ via WG"

    - name: "Sede B - Aplicar Rutas Estáticas"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}/api/routes/routes/reconfigure"
        method: POST
        user: "{{ sedeB_api_key }}"
        password: "{{ sedeB_api_secret }}"
        force_basic_auth: true
        validate_certs: false
        status_code: 200
        body_format: json
        body: {}